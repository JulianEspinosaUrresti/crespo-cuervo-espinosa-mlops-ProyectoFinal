name: Deploy Prod

on:
  push:
    branches:
      - prod

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt  
          pip install scikit-learn skl2onnx onnx

      - name: Download test data and ONNX model
        run: |
          mkdir -p data models
          curl -L -o data/test_data.json "https://github.com/user-attachments/files/28938272/test_data.json"
          curl -L -o credit_model.zip "https://github.com/user-attachments/files/28932066/credit_model.zip"
          unzip -o credit_model.zip -d models    

  build:
    needs: test

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t proyecto-final-prod -f docker/Dockerfile .